name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

      - name: Discord deploy notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          AUTHOR="${{ github.actor }}"
          URL="${{ steps.deployment.outputs.page_url }}"

          # Build commit list with real newlines
          DESC="**Recent changes:**"
          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            DESC="$DESC
• [\`$HASH\`](https://github.com/$REPO/commit/$HASH) $MSG"
          done <<< "$(git log --oneline -10 --no-decorate)"

          # Use --rawfile so jq preserves real newlines
          echo "$DESC" > /tmp/desc.txt
          PAYLOAD=$(jq -n \
            --rawfile desc /tmp/desc.txt \
            --arg title "🚀 Spawn Wars Deployed" \
            --arg url "$URL" \
            --arg footer "Deployed by $AUTHOR • $SHORT_SHA" \
            '{
              embeds: [{
                title: $title,
                description: ($desc | rtrimstr("\n")),
                url: $url,
                color: 5763719,
                footer: { text: $footer }
              }]
            }')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
